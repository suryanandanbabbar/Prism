spring:
  application:
    name: job-tracker-system
  datasource:
    url: jdbc:postgresql://localhost:5432/job_tracker
    username: job_tracker_user
    password: job_tracker_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

app:
  file-storage:
    upload-dir: ./uploads/cvs
  resume-processing:
    base-url: http://localhost:8000
    connect-timeout: 3s
    read-timeout: 30s
  job-scraper:
    base-url: http://localhost:8010
    connect-timeout: 3s
    read-timeout: 45s
    scheduler-enabled: true
